version: '3.8'

services:
  app:
    build: .
    container_name: python-sidecar
    restart: unless-stopped
    ports:
      - "4002:4002"
    volumes:
      # Mount current directory for hot-reloading/easy updates
      - .:/app
    environment:
      - PORT=4002
      - LOG_LEVEL=INFO
    # Use the healthcheck defined in Dockerfile or override here
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
