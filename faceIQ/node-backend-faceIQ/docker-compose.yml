# =============================================================================
# Docker Compose — faceIQ/node-backend-faceIQ
# =============================================================================
# Infrastructure for the faceIQ face-analysis microservice:
#
#   - Qdrant     : vector DB for face embeddings (per-event collections)
#   - CompreFace : optional full face-recognition platform (Java + Python ML);
#                  only needed when an org uses faceRecognitionProvider=COMPREFACE
#
# Postgres and Redis are NOT declared here — this service reuses the shared
# Postgres/Redis instances started by photography/node-backend-photography.
# Point your .env at the same host/port and use the `img_analyse` database.
#
# InsightFace / SCRFD / YuNet are served by common/vision-core (start its own
# compose separately).
#
# Usage:
#   docker compose up -d                      # starts qdrant + compreface
#   docker compose up -d qdrant               # qdrant only (recommended baseline)
#   docker compose down                       # keep volumes
#   docker compose down -v                    # wipe vectors + compreface db
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Qdrant — vector database for face embeddings
  # Each event gets a collection: org_{orgSlug}_event_{eventSlug}_faces
  # 512-dim vectors, cosine distance, HNSW index.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: faceiq_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # CompreFace — optional face-recognition platform
  # Source: https://github.com/exadel-inc/CompreFace
  # Only required if an organization sets faceRecognitionProvider=COMPREFACE.
  # Orgs using INSIGHTFACE can skip these services entirely.
  # ---------------------------------------------------------------------------
  compreface-postgres-db:
    image: postgres:13.3-alpine
    container_name: faceiq_compreface_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sip_compreface
      POSTGRES_DB: compreface
    volumes:
      - compreface_postgres_data:/var/lib/postgresql/data

  compreface-admin:
    image: exadel/compreface-admin:latest
    container_name: faceiq_compreface_admin
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sip_compreface
      - POSTGRES_URL=jdbc:postgresql://compreface-postgres-db:5432/compreface
      - SPRING_PROFILES_ACTIVE=dev
      - ENABLE_EMAIL_SERVER=false
    depends_on:
      - compreface-postgres-db
      - compreface-api

  compreface-api:
    image: exadel/compreface-api:latest
    container_name: faceiq_compreface_api
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sip_compreface
      - POSTGRES_URL=jdbc:postgresql://compreface-postgres-db:5432/compreface
      - SPRING_PROFILES_ACTIVE=dev
      - SAVE_IMAGES_TO_DB=false
    depends_on:
      - compreface-postgres-db

  compreface-fe:
    image: exadel/compreface-fe:latest
    container_name: faceiq_compreface_ui
    restart: always
    ports:
      - "8080:80"   # remapped from 8000 to avoid clashing with visionIQ node-backend (:8000)
    environment:
      - CLIENT_MAX_BODY_SIZE=50M
      - PROXY_READ_TIMEOUT=60s
      - PROXY_CONNECT_TIMEOUT=60s
    depends_on:
      - compreface-api
      - compreface-admin

  compreface-core:
    image: exadel/compreface-core:latest
    container_name: faceiq_compreface_core
    restart: always
    environment:
      - ML_PORT=3000

volumes:
  qdrant_data:
    driver: local
  compreface_postgres_data:
    driver: local
